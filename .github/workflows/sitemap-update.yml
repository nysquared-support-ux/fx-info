name: Auto Update Sitemap Lastmod

on:
  push:
    branches: [main]
    paths:
      - 'src/pages/**'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 毎日 09:00 JST (UTC 00:00)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update sitemap lastmod
        run: |
          TODAY=$(date +%Y-%m-%d)
          if [ -f public/sitemap.xml ]; then
            sed -i "s|<lastmod>[0-9-]*</lastmod>|<lastmod>$TODAY</lastmod>|g" public/sitemap.xml
            echo "Updated lastmod to $TODAY"
          else
            echo "public/sitemap.xml not found, skipping"
          fi
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: sitemap lastmod update'
          file_pattern: 'public/sitemap.xml'
